services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-koiboi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koiboi}
      POSTGRES_DB: ${POSTGRES_DB:-koiboi_study}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koiboi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-koiboi}:${POSTGRES_PASSWORD:-koiboi}@db:5432/${POSTGRES_DB:-koiboi_study}
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
